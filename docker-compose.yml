services:
  frontend:
    build: .
    ports:
      - "8083:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kanata-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3051:3051"
    restart: unless-stopped
    networks:
      - kanata-network

networks:
  kanata-network:
    driver: bridge
